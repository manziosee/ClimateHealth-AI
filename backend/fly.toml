app = "climatehealth-ai"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT        = "8000"
  PYTHONPATH  = "/app"
  APP_ENV     = "production"
  GITHUB_REPO = "manziosee/ClimateHealth-AI"

[http_service]
  internal_port        = 8000
  force_https          = true
  auto_stop_machines   = true
  auto_start_machines  = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "120s"
    interval     = "30s"
    method       = "GET"
    path         = "/health"
    timeout      = "15s"

[[vm]]
  memory   = "1gb"
  cpu_kind = "shared"
  cpus     = 1
