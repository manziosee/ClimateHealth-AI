name: Backend CI

on:
  push:
    branches: [main, dev]
    paths:
      - "app/**"
      - "alembic/**"
      - "requirements.txt"
      - "Dockerfile"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "alembic/**"
      - "requirements.txt"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: Lint & Smoke Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify all imports resolve
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -c "
          import fastapi, uvicorn, sqlalchemy, asyncpg, alembic
          import pydantic, httpx, redis, pandas, numpy, sklearn, xgboost, joblib
          import apscheduler, groq
          print('All imports OK')
          "

      - name: Verify ML pipeline (all 6 diseases)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -c "
          from app.ml.data_generator import generate
          from app.ml.pipeline import engineer_features, FEATURE_COLUMNS
          diseases = ['malaria', 'flu', 'cholera', 'dengue', 'pneumonia', 'meningitis']
          for d in diseases:
              df = generate(d, n_samples=50)
              X = engineer_features(df)[FEATURE_COLUMNS]
              assert X.shape == (50, len(FEATURE_COLUMNS)), f'{d}: bad shape {X.shape}'
          print(f'Pipeline OK -- {len(diseases)} diseases x {len(FEATURE_COLUMNS)} features')
          "

      - name: Verify FastAPI app loads
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: "postgresql+asyncpg://user:pass@localhost/db"
          REDIS_URL: "redis://localhost:6379/0"
        run: |
          python -c "
          from app.main import app
          assert app.title == 'ClimateHealth AI'
          assert app.version == '1.2.0'
          print('FastAPI app loads OK, version', app.version)
          "

  deploy:
    name: Deploy to Fly.io
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: fly-deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
